# TENDRIL_HOME environment variable is required (points to this config directory)
# REPOS_HOME environment variable is optional (base path for relative repo paths)

codingAgent: claude
jobTimeout: 30
staleOutputTimeout: 10
gitTimeout: 10  # Timeout in seconds for git operations (default: 10)
maxConcurrentJobs: 5  # Maximum number of jobs to run concurrently (default: 5)

# Variable Expansion Support:
# - %TENDRIL_HOME% - Expands to TENDRIL_HOME env var (useful in hooks, verification prompts, and allowedTools paths)
# - %ANY_ENV_VAR% - Standard environment variable expansion (e.g., %REPOS_HOME% for repo paths)
# Common uses: repo paths, hook script paths, allowedTools file patterns
# See VARIABLE_EXPANSION.md for details
#
# Stack-specific expansion (optional):
# - %DotnetUserSecrets:Section:Key% - Read from .NET user secrets (requires .csproj with UserSecretsId)

# Example with environment variables for sensitive data:
# llm:
#   endpoint: %OPENAI_ENDPOINT%
#   apiKey: %OPENAI_API_KEY%
#   model: gpt-4o-mini

# Agent profiles — each agent has three profiles: deep, balanced, quick.
# Promptwares reference profiles by name so switching codingAgent automatically
# picks the right model and effort without per-promptware changes.
codingAgents:
- name: claude
  profiles:
  - name: deep
    model: opus
    effort: max
  - name: balanced
    model: sonnet
    effort: high
  - name: quick
    model: haiku
    effort: low
- name: codex
  profiles:
  - name: deep
    model: gpt-5.4
    effort: high
  - name: balanced
    model: gpt-5.4-mini
    effort: medium
  - name: quick
    model: gpt-5.3-codex
    effort: low
- name: gemini
  profiles:
  - name: deep
    model: gemini-3-flash-preview
  - name: balanced
    model: gemini-3-flash-preview
  - name: quick
    model: gemini-3-flash-preview
- name: copilot
  profiles:
  - name: deep
    model: gpt-5.2
    effort: high
  - name: balanced
    model: gpt-5.2
    effort: medium
  - name: quick
    model: gpt-5.2
    effort: low

# Each promptware is connected to a profile (deep/balanced/quick).
# The profile determines model and effort from the active coding agent above.
# _default provides base values. Specific entries override only the fields they define;
# unspecified fields are inherited from _default.
#
# Allowed tools use Claude Code format: Tool, Tool(path-glob), Bash(command-pattern).
# Read, Glob, Grep are always safe (read-only). Write/Edit can be scoped to directories.
# Job context variables are expanded at launch time:
#   %PLANS_DIR%    — the plans directory (e.g., /home/user/tendril/Plans)
#   %PLAN_FOLDER%  — the specific plan folder (e.g., /home/user/tendril/Plans/01234-MyPlan)
#   %TENDRIL_HOME% — the TENDRIL_HOME environment variable
# For Codex: Write/Edit path scopes are translated to --add-dir flags.
# For Gemini: Write/Edit path scopes are translated to --include-directories flags.
# For Copilot: Write/Edit path scopes are translated to --add-dir flags.
promptwares:
  CreatePlan:
    profile: balanced
    allowedTools:
    - Read
    - Glob
    - Grep
    - Bash
    - 'Write(%PLANS_DIR%/**)'
    - 'Edit(%PLANS_DIR%/**)'
  ExecutePlan:
    profile: deep
    allowedTools:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Bash
    - WebFetch
    - WebSearch
  ExpandPlan:
    profile: balanced
    allowedTools:
    - Read
    - Glob
    - Grep
    - Bash
    - 'Write(%PLAN_FOLDER%/**)'
  UpdatePlan:
    profile: balanced
    allowedTools:
    - Read
    - Glob
    - Grep
    - Bash
    - 'Write(%PLAN_FOLDER%/**)'
  SplitPlan:
    profile: balanced
    allowedTools:
    - Read
    - Bash
    - 'Write(%PLANS_DIR%/**)'
  CreatePr:
    profile: balanced
    allowedTools:
    - Read
    - Glob
    - Grep
    - Bash
    - 'Write(%PLAN_FOLDER%/**)'
    - 'Edit(%PLAN_FOLDER%/**)'
  CreateIssue:
    profile: balanced
    allowedTools:
    - Read
    - Bash
  UpdateProject:
    profile: deep
    allowedTools:
    - Read
    - Glob
    - Grep
    - Bash

# Projects — add your projects here. Each project groups repos, verifications, and context.
#
# Example .NET project:
# projects:
#   - name: MyProject
#     color: Blue           # UI color: Blue, Emerald, Rose, Purple, Teal, Sky, Slate, etc.
#     repos:
#       - path: /absolute/path/to/repo
#         prRule: default    # PR merge strategy: default or yolo (auto-merge)
#         # baseBranch: develop       # Override default branch (auto-detected if omitted)
#         # syncStrategy: fetch       # fetch (default) | rebase | merge
#       - path: "%REPOS_HOME%/my-repo"
#         baseBranch: main
#         syncStrategy: rebase
#     verifications:
#       - name: Build
#         required: true
#       - name: Format
#         required: true
#       - name: Test
#         required: true
#       - name: CheckResult
#         required: true
#     context: >
#       Description of the project for AI context.
#       Key folders and instructions go here.
#     reviewActions:
#       - name: RunSample
#         condition: Test-Path "artifacts/sample"
#         action: <command to run your sample app>
#     hooks:
#       - name: SlackNotify
#         when: after
#         promptwares: [CreatePr]
#         condition: ''
#         action: pwsh -NoProfile -File %TENDRIL_HOME%/Hooks/NotifySlack.ps1
#     # buildDependencies — repos needed for building but not modified by plans.
#     # Worktrees are created for these repos (read-only) so cross-repo project
#     # references resolve during build. No commits or PRs are created for them.
#     buildDependencies:
#       - "%REPOS_HOME%/shared-framework"
#
# Example Ivy-Tendril project (if working on Tendril itself):
# projects:
#   - name: Ivy Tendril
#     color: Yellow
#     repos:
#       - path: %REPOS_HOME%/Ivy-Tendril
#         prRule: default
#         syncStrategy: fetch
#     verifications:
#       - name: CheckResult
#         required: true
#       - name: Build
#         required: true
#       - name: Format
#         required: true
#       - name: Test
#         required: true
#       - name: Lint
#         required: true
#     context: >
#       AI coding agent orchestrator built on Ivy Framework. Manages plan lifecycles,
#       orchestrates Claude/Codex/Gemini agents, and provides GitHub PR integration.
#       Key folders: src/Ivy.Tendril/Services/, src/Ivy.Tendril/Apps/, src/Ivy.Tendril/Promptwares/
projects: []

# Standard verification definitions — these prompts are used when verifications are referenced by projects.
# Define verifications appropriate for your tech stack.
verifications:
- name: CheckResult
  prompt: >
    Verify the implementation matches what was requested in the plan.
    1. Read the plan revision from `<PlanFolder>/revisions/` (latest numbered .md file)
    2. Review all commits made by this execution
    3. Compare the plan's Problem and Solution sections against the actual changes
    4. Write the verification report to `<PlanFolder>/verification/CheckResult.md`

# Stack-specific verification examples (uncomment and customize for your stack):

# .NET:
# - name: DotnetBuild
#   prompt: Run `dotnet build --warnaserror` in the plan's worktree directory and verify it succeeds.
# - name: DotnetFormat
#   prompt: >
#     Run `dotnet format` on changed .cs files. Get changed files with
#     `git diff --name-only --diff-filter=ACM HEAD~<N> -- '*.cs'`, then run `dotnet format --include <files>`.
# - name: DotnetTest
#   prompt: >
#     Run dotnet tests using the filter from the plan's **## Tests** section.
#     If plan specifies `dotnet test --filter <expression>`, run it. Verify all tests pass.

# JavaScript/TypeScript:
# - name: NpmBuild
#   prompt: Run `npm run build` in the plan's worktree directory and verify it succeeds.
# - name: NpmLint
#   prompt: Run `npm run lint` on changed files and fix any errors.
# - name: NpmTest
#   prompt: Run `npm test` with the filter from the plan's **## Tests** section.

# Python:
# - name: PythonLint
#   prompt: Run `black --check .` and `flake8` on changed .py files.
# - name: PythonTest
#   prompt: Run `pytest <files>` with the filter from the plan's **## Tests** section.

# Go:
# - name: GoBuild
#   prompt: Run `go build ./...` and verify it succeeds.
# - name: GoTest
#   prompt: Run `go test <packages>` with the filter from the plan's **## Tests** section.

levels:
  - name: Bug
    badge: Destructive
  - name: Critical
    badge: Warning
  - name: NiceToHave
    badge: Outline
  - name: Epic
    badge: Info

# Editor configuration for opening files and folders.
# The 'command' must be available on your system's PATH.
#
# Common editors:
#   VS Code:    command: code         (Windows: auto. macOS: run "Shell Command: Install 'code' command in PATH" from VS Code)
#   Cursor:     command: cursor
#   Zed:        command: zed
#   Sublime:    command: subl
#   Vim:        command: vim
#   Nano:       command: nano
editor:
  command: code
  label: VS Code

telemetry: true

planTemplate: >
  # {title}

  ## Problem

  ## Solution

  ## Tests

  **New tests:**

  (specify tests to write for new functionality, or "None" if no new tests needed)

  **Test scope:**

  Specify which tests to run using your test framework's syntax (e.g., `dotnet test --filter "..."`, `jest --testPathPattern=...`, `pytest tests/specific/`, or "No existing test coverage" / "Run all tests — <justification>")

  ## Verification
