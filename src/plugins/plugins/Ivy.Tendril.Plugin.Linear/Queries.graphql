query GetTeams {
  teams {
    nodes {
      id
      name
      key
    }
  }
}

query GetTeamIssues($teamId: String!, $first: Int, $after: String) {
  team(id: $teamId) {
    issues(first: $first, after: $after) {
      nodes {
        id
        identifier
        title
        description
        priority
        priorityLabel
        url
        createdAt
        updatedAt
        state {
          id
          name
          type
        }
        assignee {
          id
          name
        }
        labels {
          nodes {
            id
            name
            color
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query GetProjects {
  projects(first: 100) {
    nodes {
      id
      name
    }
  }
}

query GetIssues($first: Int, $after: String, $filter: IssueFilter) {
  issues(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      identifier
      title
      description
      priority
      priorityLabel
      url
      createdAt
      updatedAt
      state {
        id
        name
        type
      }
      assignee {
        id
        name
      }
      labels {
        nodes {
          id
          name
          color
        }
      }
      team {
        id
        name
        key
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
