name: Publish Ivy.Tendril

permissions:
  contents: write
  id-token: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  publish-nuget:
    needs: version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.13

      - name: Setup Java (for ANTLR4)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore Ivy.Tendril/Ivy.Tendril.csproj

      - name: Pack NuGet
        run: |
          dotnet pack Ivy.Tendril/Ivy.Tendril.csproj \
            --configuration Release \
            --output ./nupkg \
            /p:Version=${{ needs.version.outputs.version }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: rorychatt-ivy

      - name: Clean NuGet output before signing
        run: |
          find ./nupkg -mindepth 1 -maxdepth 1 -not -name "*.nupkg" -exec rm -rf {} +
          mkdir -p ./nupkg_signed

      - name: Sign NuGet packages
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: nupkg
          output_path: nupkg_signed

      - name: Overwrite origin with signed nuget
        run: |
          cp -f ./nupkg_signed/*.nupkg ./nupkg/

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish summary
        if: always()
        run: |
          echo "## Ivy.Tendril Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version: ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**NuGet**: [Ivy.Tendril](https://www.nuget.org/packages/Ivy.Tendril)" >> $GITHUB_STEP_SUMMARY

  publish-desktop:
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.13

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore Ivy.Tendril/Ivy.Tendril.csproj

      - name: Install vpk tool and dependencies
        run: |
          dotnet tool install -g vpk
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y libfuse2
          fi

      - name: Set Icon Path
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "ICON_PATH=Ivy.Tendril/Assets/Tendril.ico" >> $GITHUB_ENV
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "ICON_PATH=Ivy.Tendril/Assets/Tendril.icns" >> $GITHUB_ENV
          else
            echo "ICON_PATH=Ivy.Tendril/Assets/Tendril.png" >> $GITHUB_ENV
          fi

      - name: Publish Desktop Binary
        run: |
          dotnet publish Ivy.Tendril/Ivy.Tendril.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output ./publish/desktop/${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:ReadyToRun=false \
            -p:Version=${{ needs.version.outputs.version }} \
            --self-contained true

      - name: Pack Installer (Velopack)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          EXE_NAME="Ivy.Tendril"
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            EXE_NAME="Ivy.Tendril.exe"
          fi

          vpk pack \
            --packId IvyTendril \
            --packVersion ${{ needs.version.outputs.version }} \
            --packDir ./publish/desktop/${{ matrix.rid }} \
            --mainExe $EXE_NAME \
            --outputDir ./releases \
            --icon "$ICON_PATH" \
            $( [[ "${{ matrix.os }}" != "ubuntu-latest" ]] && echo "--noPortable" ) \
            --delta None \
            $( [[ "${{ matrix.rid }}" == osx-* ]] && echo "--bundleId com.ivy.tendril" )

      - name: Prepare Windows installer for signing
        if: startsWith(matrix.rid, 'win-')
        run: |
          mkdir -p unsigned_releases signed_releases
          find releases -maxdepth 1 -type f \( -name "*.exe" \) -exec cp {} unsigned_releases/ \;

      - name: Sign Windows installer
        if: startsWith(matrix.rid, 'win-')
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: unsigned_releases
          output_path: signed_releases

      - name: Overwrite origin with signed installer
        if: startsWith(matrix.rid, 'win-')
        run: |
          cp -f signed_releases/*.exe releases/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tendril-installer-${{ matrix.rid }}
          path: |
            releases/*.exe
            releases/*.pkg
            releases/*.AppImage
            releases/*.nupkg
            releases/RELEASES

  upload-release-assets:
    needs: [version, publish-nuget, publish-desktop]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tendril-installer-*
          merge-multiple: true

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" ./* \
            --repo "${{ github.repository }}" \
            --clobber

  # TODO: Enable deploy-docs once Ivy.Docs.Helpers is published to NuGet
