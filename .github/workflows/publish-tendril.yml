name: Publish Ivy.Tendril

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test-mode:
        description: 'Test mode (do not publish to NuGet, do not create release)'
        required: false
        type: boolean
        default: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/Directory.Build.props | head -n 1)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  publish-nuget:
    needs: version
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.22

      - name: Setup Java (for ANTLR4)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore src/Ivy.Tendril/Ivy.Tendril.csproj

      - name: Restore Updater
        run: dotnet restore src/Ivy.Tendril.Updater/Ivy.Tendril.Updater.csproj

      - name: Build Updater (all platforms)
        run: |
          dotnet publish src/Ivy.Tendril.Updater/Ivy.Tendril.Updater.csproj -c Release -r win-x64 --self-contained false -o ./PublishedBinaries/Ivy.Tendril.Updater/win-x64
          dotnet publish src/Ivy.Tendril.Updater/Ivy.Tendril.Updater.csproj -c Release -r win-arm64 --self-contained false -o ./PublishedBinaries/Ivy.Tendril.Updater/win-arm64
          dotnet publish src/Ivy.Tendril.Updater/Ivy.Tendril.Updater.csproj -c Release -r osx-x64 --self-contained false -o ./PublishedBinaries/Ivy.Tendril.Updater/osx-x64
          dotnet publish src/Ivy.Tendril.Updater/Ivy.Tendril.Updater.csproj -c Release -r osx-arm64 --self-contained false -o ./PublishedBinaries/Ivy.Tendril.Updater/osx-arm64

      - name: Clean Updater binaries
        run: |
          for dir in win-x64 win-arm64 osx-x64 osx-arm64; do
            find ./PublishedBinaries/Ivy.Tendril.Updater/$dir -type f ! \( -name "*.exe" -o -name "*.dll" -o -name "*.dylib" -o -name "Ivy.Tendril.Updater" \) -delete
          done

      - name: Zip Updater binaries
        run: |
          cd PublishedBinaries/Ivy.Tendril.Updater/win-x64 && zip -r ../../../Ivy.Tendril.Updater.win-x64.zip . && cd ../../..
          cd PublishedBinaries/Ivy.Tendril.Updater/win-arm64 && zip -r ../../../Ivy.Tendril.Updater.win-arm64.zip . && cd ../../..
          cd PublishedBinaries/Ivy.Tendril.Updater/osx-x64 && zip -r ../../../Ivy.Tendril.Updater.osx-x64.zip . && cd ../../..
          cd PublishedBinaries/Ivy.Tendril.Updater/osx-arm64 && zip -r ../../../Ivy.Tendril.Updater.osx-arm64.zip . && cd ../../..

      - name: Embed Updater binaries in Ivy.Tendril
        run: |
          mkdir -p src/Ivy.Tendril/PublishedBinaries
          cp Ivy.Tendril.Updater.win-x64.zip src/Ivy.Tendril/PublishedBinaries/
          cp Ivy.Tendril.Updater.win-arm64.zip src/Ivy.Tendril/PublishedBinaries/
          cp Ivy.Tendril.Updater.osx-x64.zip src/Ivy.Tendril/PublishedBinaries/
          cp Ivy.Tendril.Updater.osx-arm64.zip src/Ivy.Tendril/PublishedBinaries/

      - name: Pack NuGet
        run: |
          dotnet pack src/Ivy.Tendril/Ivy.Tendril.csproj \
            --configuration Release \
            --output ./nupkg \
            /p:Version=${{ needs.version.outputs.version }} \
            /p:CommitId=${{ github.sha }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: rorychatt-ivy

      - name: Clean NuGet output before signing
        run: |
          find ./nupkg -mindepth 1 -maxdepth 1 -not -name "*.nupkg" -exec rm -rf {} +
          mkdir -p ./nupkg_signed

      - name: Sign NuGet packages
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: nupkg
          output_path: nupkg_signed

      - name: Overwrite origin with signed nuget
        run: |
          cp -f ./nupkg_signed/*.nupkg ./nupkg/

      - name: Push to NuGet
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.test-mode)
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish summary
        if: always()
        run: |
          echo "## Ivy.Tendril Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version: ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**NuGet**: [Ivy.Tendril](https://www.nuget.org/packages/Ivy.Tendril)" >> $GITHUB_STEP_SUMMARY

  publish-desktop:
    needs: version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.22

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore src/Ivy.Tendril/Ivy.Tendril.csproj

      - name: Install vpk tool and dependencies
        run: |
          dotnet tool install -g vpk
          if [[ "${{ matrix.rid }}" == linux-* ]]; then
            sudo apt-get update && sudo apt-get install -y libfuse2
          fi

      - name: Set Icon Path
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            echo "ICON_PATH=src/Ivy.Tendril/Assets/icon.ico" >> $GITHUB_ENV
          elif [[ "${{ matrix.rid }}" == osx-* ]]; then
            echo "ICON_PATH=src/Ivy.Tendril/Assets/icon.icns" >> $GITHUB_ENV
          else
            echo "ICON_PATH=src/Ivy.Tendril/Assets/icon.png" >> $GITHUB_ENV
          fi

      - name: Publish Desktop Binary
        run: |
          dotnet publish src/Ivy.Tendril/Ivy.Tendril.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output ./publish/desktop/${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:ReadyToRun=false \
            -p:Version=${{ needs.version.outputs.version }} \
            -p:CommitId=${{ github.sha }} \
            --self-contained true

      - name: Bundle PowerShell 7
        shell: bash
        run: |
          PWSH_VERSION="7.4.2"
          RID="${{ matrix.rid }}"
          PUBLISH_DIR="./publish/desktop/$RID"
          TARGET_DIR="$PUBLISH_DIR/PowerShell"
          mkdir -p "$TARGET_DIR"
          
          echo "Bundling PowerShell $PWSH_VERSION for $RID into $TARGET_DIR..."
          
          if [[ "$RID" == win-x64 ]]; then
            URL="https://github.com/PowerShell/PowerShell/releases/download/v$PWSH_VERSION/PowerShell-$PWSH_VERSION-win-x64.zip"
            curl -L -o pwsh.zip "$URL"
            unzip -q pwsh.zip -d "$TARGET_DIR"
            rm pwsh.zip
          elif [[ "$RID" == win-arm64 ]]; then
            URL="https://github.com/PowerShell/PowerShell/releases/download/v$PWSH_VERSION/PowerShell-$PWSH_VERSION-win-arm64.zip"
            curl -L -o pwsh.zip "$URL"
            unzip -q pwsh.zip -d "$TARGET_DIR"
            rm pwsh.zip
          elif [[ "$RID" == osx-x64 ]]; then
            URL="https://github.com/PowerShell/PowerShell/releases/download/v$PWSH_VERSION/powershell-$PWSH_VERSION-osx-x64.tar.gz"
            curl -L -o pwsh.tar.gz "$URL"
            tar -xzf pwsh.tar.gz -C "$TARGET_DIR"
            rm pwsh.tar.gz
          elif [[ "$RID" == osx-arm64 ]]; then
            URL="https://github.com/PowerShell/PowerShell/releases/download/v$PWSH_VERSION/powershell-$PWSH_VERSION-osx-arm64.tar.gz"
            curl -L -o pwsh.tar.gz "$URL"
            tar -xzf pwsh.tar.gz -C "$TARGET_DIR"
            rm pwsh.tar.gz
          elif [[ "$RID" == linux-x64 ]]; then
            URL="https://github.com/PowerShell/PowerShell/releases/download/v$PWSH_VERSION/powershell-$PWSH_VERSION-linux-x64.tar.gz"
            curl -L -o pwsh.tar.gz "$URL"
            tar -xzf pwsh.tar.gz -C "$TARGET_DIR"
            rm pwsh.tar.gz
          elif [[ "$RID" == linux-arm64 ]]; then
            URL="https://github.com/PowerShell/PowerShell/releases/download/v$PWSH_VERSION/powershell-$PWSH_VERSION-linux-arm64.tar.gz"
            curl -L -o pwsh.tar.gz "$URL"
            tar -xzf pwsh.tar.gz -C "$TARGET_DIR"
            rm pwsh.tar.gz
          fi
          
          # Verify pwsh executable exists and is executable
          if [[ "$RID" == win-* ]]; then
            if [[ ! -f "$TARGET_DIR/pwsh.exe" ]]; then
              echo "Error: pwsh.exe not found after extraction!"
              exit 1
            fi
          else
            if [[ ! -f "$TARGET_DIR/pwsh" ]]; then
              echo "Error: pwsh not found after extraction!"
              exit 1
            fi
            chmod +x "$TARGET_DIR/pwsh"
          fi
          echo "PowerShell bundled successfully!"

      - name: Bundle .NET 10 SDK
        shell: bash
        run: |
          DOTNET_VERSION="10.0.100"
          RID="${{ matrix.rid }}"
          PUBLISH_DIR="./publish/desktop/$RID"
          TARGET_DIR="$PUBLISH_DIR/dotnet"
          mkdir -p "$TARGET_DIR"
          
          echo "Bundling .NET $DOTNET_VERSION for $RID into $TARGET_DIR..."
          
          if [[ "$RID" == win-x64 ]]; then
            URL="https://dotnetcli.azureedge.net/dotnet/Sdk/$DOTNET_VERSION/dotnet-sdk-$DOTNET_VERSION-win-x64.zip"
            curl -L -o dotnet.zip "$URL"
            unzip -q dotnet.zip -d "$TARGET_DIR"
            rm dotnet.zip
          elif [[ "$RID" == win-arm64 ]]; then
            URL="https://dotnetcli.azureedge.net/dotnet/Sdk/$DOTNET_VERSION/dotnet-sdk-$DOTNET_VERSION-win-arm64.zip"
            curl -L -o dotnet.zip "$URL"
            unzip -q dotnet.zip -d "$TARGET_DIR"
            rm dotnet.zip
          elif [[ "$RID" == osx-x64 ]]; then
            URL="https://dotnetcli.azureedge.net/dotnet/Sdk/$DOTNET_VERSION/dotnet-sdk-$DOTNET_VERSION-osx-x64.tar.gz"
            curl -L -o dotnet.tar.gz "$URL"
            tar -xzf dotnet.tar.gz -C "$TARGET_DIR"
            rm dotnet.tar.gz
          elif [[ "$RID" == osx-arm64 ]]; then
            URL="https://dotnetcli.azureedge.net/dotnet/Sdk/$DOTNET_VERSION/dotnet-sdk-$DOTNET_VERSION-osx-arm64.tar.gz"
            curl -L -o dotnet.tar.gz "$URL"
            tar -xzf dotnet.tar.gz -C "$TARGET_DIR"
            rm dotnet.tar.gz
          elif [[ "$RID" == linux-x64 ]]; then
            URL="https://dotnetcli.azureedge.net/dotnet/Sdk/$DOTNET_VERSION/dotnet-sdk-$DOTNET_VERSION-linux-x64.tar.gz"
            curl -L -o dotnet.tar.gz "$URL"
            tar -xzf dotnet.tar.gz -C "$TARGET_DIR"
            rm dotnet.tar.gz
          elif [[ "$RID" == linux-arm64 ]]; then
            URL="https://dotnetcli.azureedge.net/dotnet/Sdk/$DOTNET_VERSION/dotnet-sdk-$DOTNET_VERSION-linux-arm64.tar.gz"
            curl -L -o dotnet.tar.gz "$URL"
            tar -xzf dotnet.tar.gz -C "$TARGET_DIR"
            rm dotnet.tar.gz
          fi
          
          # Verify dotnet executable exists and is executable
          if [[ "$RID" == win-* ]]; then
            if [[ ! -f "$TARGET_DIR/dotnet.exe" ]]; then
              echo "Error: dotnet.exe not found after extraction!"
              exit 1
            fi
          else
            if [[ ! -f "$TARGET_DIR/dotnet" ]]; then
              echo "Error: dotnet not found after extraction!"
              exit 1
            fi
            chmod +x "$TARGET_DIR/dotnet"
          fi
          echo ".NET SDK bundled successfully!"

      - name: Import Apple Certificates (macOS)
        if: startsWith(matrix.rid, 'osx-')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: "temporary-keychain-pwd"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode the certificate p12
          echo -n "$MACOS_CERTIFICATE" | base64 --decode --output $CERTIFICATE_PATH

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import p12
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Store Notary Credentials (macOS)
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "tendril-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD"

      - name: Pack Installer (Velopack)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          EXE_NAME="Ivy.Tendril"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            EXE_NAME="Ivy.Tendril.exe"
          fi

          PACK_DIR="./publish/desktop/${{ matrix.rid }}"

          # Export macOS environment variables for signing & notarization
          if [[ "${{ matrix.rid }}" == osx-* ]]; then
            export VPK_SIGN_APP_IDENTITY="${{ secrets.MACOS_SIGN_APP_IDENTITY }}"
            export VPK_SIGN_INSTALL_IDENTITY="${{ secrets.MACOS_SIGN_INSTALL_IDENTITY }}"
            export VPK_NOTARY_PROFILE="tendril-notary"
            export VPK_KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
            export VPK_SIGN_DISABLE_DEEP="true"

            APP_DIR="./publish/desktop/IvyTendril.app"
            rm -rf "$APP_DIR"
            mkdir -p "$APP_DIR/Contents/MacOS"
            mkdir -p "$APP_DIR/Contents/Resources"

            # Copy published outputs to Contents/MacOS
            cp -R ./publish/desktop/${{ matrix.rid }}/* "$APP_DIR/Contents/MacOS/"

            # Move nested runtime folders and config files to Contents/Resources
            if [ -d "$APP_DIR/Contents/MacOS/dotnet" ]; then
              mv "$APP_DIR/Contents/MacOS/dotnet" "$APP_DIR/Contents/Resources/"
            fi
            if [ -d "$APP_DIR/Contents/MacOS/PowerShell" ]; then
              mv "$APP_DIR/Contents/MacOS/PowerShell" "$APP_DIR/Contents/Resources/"
            fi
            if [ -f "$APP_DIR/Contents/MacOS/example.config.yaml" ]; then
              mv "$APP_DIR/Contents/MacOS/example.config.yaml" "$APP_DIR/Contents/Resources/"
            fi
            if [ -f "$APP_DIR/Contents/MacOS/config.yaml" ]; then
              mv "$APP_DIR/Contents/MacOS/config.yaml" "$APP_DIR/Contents/Resources/"
            fi

            # Copy icon
            cp "$ICON_PATH" "$APP_DIR/Contents/Resources/icon.icns"

            # Create Info.plist
            cat <<EOF > "$APP_DIR/Contents/Info.plist"
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleDevelopmentRegion</key>
                <string>en</string>
                <key>CFBundleDisplayName</key>
                <string>Ivy Tendril</string>
                <key>CFBundleExecutable</key>
                <string>Ivy.Tendril</string>
                <key>CFBundleIdentifier</key>
                <string>com.ivy.tendril</string>
                <key>CFBundleInfoDictionaryVersion</key>
                <string>6.0</string>
                <key>CFBundleName</key>
                <string>Ivy Tendril</string>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>CFBundleShortVersionString</key>
                <string>${{ needs.version.outputs.version }}</string>
                <key>CFBundleVersion</key>
                <string>${{ needs.version.outputs.version }}</string>
                <key>CFBundleIconFile</key>
                <string>icon.icns</string>
                <key>LSMinimumSystemVersion</key>
                <string>10.15</string>
                <key>NSHighResolutionCapable</key>
                <true/>
            </dict>
            </plist>
            EOF

            # Delete all PDB (debug symbol) files as they cannot be code-signed and are not needed in production
            find "$APP_DIR" -name "*.pdb" -delete
            # Delete all XML documentation files in MacOS folder as they cause codesign issues
            find "$APP_DIR/Contents/MacOS" -name "*.xml" -delete
            # Delete Linux and Windows native libraries as they are not used on macOS and cause codesign issues
            find "$APP_DIR/Contents/MacOS" -name "*.so" -delete
            find "$APP_DIR/Contents/MacOS" -name "rustino_native.dll" -delete

            # Clean up obsolete dnx
            if [ -f "$APP_DIR/Contents/Resources/dotnet/dnx" ]; then
              rm "$APP_DIR/Contents/Resources/dotnet/dnx"
            fi

            # Remove executable permission on non-binary files
            find "$APP_DIR" -type f | while read -r file; do
              if [ -x "$file" ]; then
                if ! file "$file" | grep -q "Mach-O"; then
                  chmod -x "$file"
                fi
              fi
            done

            # Pre-sign native Mach-O binaries in the runner's keychain
            echo "Pre-signing internal binaries to avoid codesign --deep errors on nested SDK folders..."
            find "$APP_DIR" -type f | while read -r file; do
              if file "$file" | grep -q "Mach-O"; then
                echo "Signing: $file"
                codesign --force --options runtime --timestamp --keychain "$RUNNER_TEMP/app-signing.keychain-db" --sign "$VPK_SIGN_APP_IDENTITY" "$file"
              fi
            done

            PACK_DIR="$APP_DIR"
          fi

          vpk pack \
            --packId IvyTendril \
            --packVersion ${{ needs.version.outputs.version }} \
            --packDir "$PACK_DIR" \
            --mainExe $EXE_NAME \
            --outputDir ./releases \
            --icon "$ICON_PATH" \
            $( [[ "${{ matrix.rid }}" != linux-* ]] && echo "--noPortable" ) \
            --delta None \
            $( [[ "${{ matrix.rid }}" == osx-* ]] && echo "--bundleId com.ivy.tendril" ) \
            --channel ${{ matrix.rid }}

      - name: Rename Installer Setup Packages
        run: |
          cd releases
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv IvyTendril-${{ matrix.rid }}-Setup.exe IvyTendril-${{ needs.version.outputs.version }}-${{ matrix.rid }}.exe
          elif [[ "${{ matrix.rid }}" == osx-* ]]; then
            mv IvyTendril-${{ matrix.rid }}-Setup.pkg IvyTendril-${{ needs.version.outputs.version }}-${{ matrix.rid }}.pkg
          elif [[ "${{ matrix.rid }}" == linux-* ]]; then
            if [ -f IvyTendril-${{ matrix.rid }}.AppImage ]; then
              mv IvyTendril-${{ matrix.rid }}.AppImage IvyTendril-${{ needs.version.outputs.version }}-${{ matrix.rid }}.AppImage
            elif [ -f IvyTendril.AppImage ]; then
              mv IvyTendril.AppImage IvyTendril-${{ needs.version.outputs.version }}-${{ matrix.rid }}.AppImage
            fi
          fi
          cd ..

      - name: Prepare Windows installer for signing
        if: startsWith(matrix.rid, 'win-')
        run: |
          mkdir -p unsigned_releases signed_releases
          find releases -maxdepth 1 -type f \( -name "*.exe" \) -exec cp {} unsigned_releases/ \;

      - name: Sign Windows installer
        if: startsWith(matrix.rid, 'win-')
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: unsigned_releases
          output_path: signed_releases

      - name: Overwrite origin with signed installer
        if: startsWith(matrix.rid, 'win-')
        run: |
          cp -f signed_releases/*.exe releases/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tendril-installer-${{ needs.version.outputs.version }}-${{ matrix.rid }}
          path: |
            releases/*.exe
            releases/*.pkg
            releases/*.AppImage
            releases/*.nupkg
            releases/RELEASES
            releases/releases.*.json

  upload-release-assets:
    needs: [version, publish-nuget, publish-desktop]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.test-mode)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tendril-installer-*
          merge-multiple: true

      - name: Create or Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.version.outputs.version }}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" ./* --repo "${{ github.repository }}" --clobber
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" ./* --repo "${{ github.repository }}" --generate-notes
          fi

  deploy-docs:
    needs: [publish-nuget, publish-desktop]
    runs-on: ubuntu-latest
    environment: production
    env:
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      APP_SERVICE_NAME: ${{ vars.TENDRIL_DOCS_SERVICE_NAME }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
      IMAGE_NAME: ${{ vars.TENDRIL_DOCS_IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Az login with OIDC'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: 'ACR Login'
        run: az acr login --name $ACR_NAME

      - name: 'Build and Push'
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
            -f .github/docker/Dockerfile.tendril-docs .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: 'Deploy to Preproduction Slot'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          images: '${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          slot-name: 'preproduction'

      - name: 'Swap Preproduction with Production'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.APP_SERVICE_NAME }} \
              --slot preproduction \
              --target-slot production

